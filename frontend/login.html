<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <main>
        <div class="conteudo-login">
            <div class="titulo">
                <h1>Bem-vindo!</h1>
            </div>

            <div class="login">
                <div class="preenchimento-login">
                    <div class="digite-login">
                        <p>Login</p>
                        <input  type="Login" placeholder="Digite seu login">
                    </div>

                    <div class="digite-senha">
                        <p>Senha</p>
                        <input type="password" placeholder="Digite sua senha">
                    </div>
                </div>

                <div class="entrar">
                    <p>Entrar</p>
                </div>

                <div class="clique-aqui">
                    <p>Não tem conta? <a href="cadastro.html">Clique aqui</a></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
