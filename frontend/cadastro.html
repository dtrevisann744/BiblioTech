<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-cadastro">
        <div class="conteudo-cadastro">
            <div class="titulo">
                <h1>Bem-vindo!</h1>
                <h2>Crie sua conta</h2>
            </div>

            <div class="login">
                <div class="preenchimento-login">
                    <div class="digite-login">
                        <p>E-mail</p>
                        <input for="email" type="email" placeholder="exemplo@email.com" required>
                    </div>

                    <div class="digite-senha">
                        <p>Telefone</p>
                        <input for="telefone" type="tel" placeholder="+55 DDD + número" required>
                    </div>

                    <div class="digite-senha">
                        <p>Nome</p>
                        <input type="text" placeholder="Seu nome completo" required>
                    </div>

                    <div class="digite-senha">
                        <p>Senha</p>
                        <input type="password" id="senha" placeholder="Crie sua senha" required>
                    </div>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="contato" required>
                    <label for="contato">
                        Aceito que entrem em contato comigo por SMS e WhatsApp
                    </label>
                </div>

                <p class="termos">
                    Ao "continuar", aceito os
                    <strong>Termos e condições</strong>
                    e autorizo o uso dos meus dados de acordo com a
                    <strong>Declaração de privacidade.</strong>
                </p>
            </div>

            <div class="entrar">
                <p>Cadastrar</p>
            </div>

            <div class="conta-criada">
                <p>Já tem conta? <a href="login.html">Entrar</a></p>
            </div>
        </div>
    </main>
</body>
</html>
