<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body>
    <main class="main-cadastro">
        <div class="conteudo-cadastro">
            <div class="titulo">
                <h1>Bem-vindo!</h1>
                <h2>Crie sua conta</h2>
            </div>

            <div class="login">
                <div class="preenchimento-login">
                    <div class="digite-login">
                        <p>E-mail</p>
                        <input  type="Login" placeholder="exemplo@email.com">
                    </div>

                    <div class="digite-senha">
                        <p>Telefone</p>
                        <input type="number" placeholder="+55 DDD +número">
                    </div>

                    <div class="digite-senha">
                        <p>Nome</p>
                        <input type="text" placeholder="Seu nome completo">
                    </div>

                    <div class="digite-senha">
                        <p>Senha</p>
                        <input type="password" placeholder="Crie sua senha">
                    </div>
                </div>
        
                <div>
                    <p>
                        <input type="checkbox" required>
                        <span>Aceito que entrem em contato comigo por SMS e Whatsapp</span>
                    </p>
                </div>

                <p class="termos">Ao "continuar", aceito os <strong>Termos e condições</strong>
                e autorizo o uso dos meus dados de acordo com a 
                <strong>Declaração de privacidade.</strong></p>

            </div>
            <div class="entrar">
                <p>Entrar</p>
            </div>
        </div>
    </main>
</body>
</html>
